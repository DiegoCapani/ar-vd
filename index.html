<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; }

#playButton{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:12px 20px;
  z-index:10;
}
</style>

</head>

<body>

<button id="playButton" onclick="playVideo()">ATTIVA ARTISTA</button>

<a-scene
embedded
arjs="sourceType: webcam; debugUIEnabled: false;">

<a-assets>
  <video
    id="alpha"
    src="assets/AlphaTestVideo.webm"
    preload="auto"
    loop
    muted
    playsinline
    webkit-playsinline
    crossorigin="anonymous">
  </video>
</a-assets>

<a-marker
 preset="hiro"
 smooth="true"
 smoothCount="10"
 smoothTolerance="0.01"
 smoothThreshold="5">

  <a-video
    src="#alpha"
    width="1.2"
    height="2.1"
    position="0 1 0">
  </a-video>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

function playVideo(){
  const vid = document.querySelector('#alpha');
  vid.play();
  document.getElementById("playButton").style.display="none";
}

</script>

</body>
</html>
